name: CI — Sistema Integrado

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Compilar projeto
        run: |
          echo "::group::Build do projeto"
          ./gradlew build -x test -x checkstyleMain -x spotbugsMain
          echo "::endgroup::"
          echo "Build concluido com sucesso" >> $GITHUB_STEP_SUMMARY

      - name: Upload do JAR compilado
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 5

  quality:
    name: Qualidade de Codigo
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Analise estatica Checkstyle
        run: |
          echo "::group::Checkstyle"
          ./gradlew checkstyleMain
          echo "::endgroup::"
          echo "### Checkstyle" >> $GITHUB_STEP_SUMMARY
          echo "Nenhuma violacao encontrada" >> $GITHUB_STEP_SUMMARY

      - name: Analise de bugs SpotBugs (SAST)
        run: |
          echo "::group::SpotBugs SAST"
          ./gradlew spotbugsMain
          echo "::endgroup::"
          echo "### SpotBugs (SAST)" >> $GITHUB_STEP_SUMMARY
          echo "Analise SAST concluida" >> $GITHUB_STEP_SUMMARY

      - name: Upload relatorio Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/

      - name: Upload relatorio SpotBugs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/

  test:
    name: Testes e Cobertura
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Executar testes unitarios e de integracao
        run: |
          echo "::group::Testes"
          ./gradlew test
          echo "::endgroup::"
          echo "### Testes" >> $GITHUB_STEP_SUMMARY
          echo "Todos os testes passaram" >> $GITHUB_STEP_SUMMARY

      - name: Gerar relatorio JaCoCo
        run: |
          echo "::group::JaCoCo Report"
          ./gradlew jacocoTestReport
          echo "::endgroup::"

      - name: Verificar cobertura minima
        run: |
          echo "::group::Verificacao de Cobertura"
          ./gradlew jacocoTestCoverageVerification
          echo "::endgroup::"
          echo "### Cobertura de Codigo" >> $GITHUB_STEP_SUMMARY
          echo "Cobertura >= 90% verificada" >> $GITHUB_STEP_SUMMARY

      - name: Upload relatorio de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      - name: Upload relatorio JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

  selenium:
    name: Testes Selenium (E2E)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Executar testes Selenium pos-deploy
        run: |
          echo "::group::Testes Selenium E2E"
          ./gradlew seleniumTest
          echo "::endgroup::"
          echo "### Testes Selenium" >> $GITHUB_STEP_SUMMARY
          echo "Testes E2E pos-deploy passaram" >> $GITHUB_STEP_SUMMARY

      - name: Upload relatorio Selenium
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: build/reports/tests/seleniumTest/

  summary:
    name: Resumo do Pipeline
    runs-on: ubuntu-latest
    needs: [build, quality, test, selenium]
    if: always()

    steps:
      - name: Gerar resumo consolidado
        run: |
          echo "# Resumo do Pipeline CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && 'Sucesso' || 'Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Qualidade | ${{ needs.quality.result == 'success' && 'Sucesso' || 'Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Testes | ${{ needs.test.result == 'success' && 'Sucesso' || 'Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Selenium | ${{ needs.selenium.result == 'success' && 'Sucesso' || 'Falhou' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Executado em: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Autor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
