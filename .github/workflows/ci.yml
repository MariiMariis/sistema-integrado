name: CI — Sistema Integrado

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissão ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Build do projeto
        run: ./gradlew build -x test -x checkstyleMain

      - name: Análise estática (Checkstyle)
        run: ./gradlew checkstyleMain

      - name: Executar testes unitários
        run: ./gradlew test

      - name: Gerar relatório JaCoCo
        run: ./gradlew jacocoTestReport

      - name: Verificar cobertura mínima (≥ 85%)
        run: ./gradlew jacocoTestCoverageVerification

      - name: Upload relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      - name: Upload relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: Upload relatório Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/
