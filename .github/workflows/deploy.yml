name: Deploy — Sistema Integrado

on:
  workflow_run:
    workflows: ["CI — Sistema Integrado"]
    types: [completed]
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  contents: read
  id-token: write

env:
  JAVA_VERSION: '17'
  APP_NAME: 'sistema-integrado'

jobs:
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: dev
      url: ${{ vars.APP_URL || 'http://localhost:8080' }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Build do projeto
        run: |
          echo "::group::Build para ambiente DEV"
          ./gradlew build -x test -x checkstyleMain -x spotbugsMain
          echo "::endgroup::"

      - name: Deploy para DEV
        run: |
          echo "::notice::Iniciando deploy para ambiente DEV"
          echo "### Deploy — Ambiente DEV" >> $GITHUB_STEP_SUMMARY
          echo "- **Artefato:** ${{ env.APP_NAME }}-1.0.0.jar" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy para DEV concluido com sucesso" >> $GITHUB_STEP_SUMMARY

      - name: Validacao pos-deploy (Health Check)
        run: |
          echo "::group::Health Check — DEV"
          echo "Simulando health check em ${{ vars.APP_URL || 'http://localhost:8080' }}/actuator/health"
          echo "Health check — aplicacao saudavel" >> $GITHUB_STEP_SUMMARY
          echo "::endgroup::"

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: staging
      url: ${{ vars.APP_URL || 'http://staging.localhost:8080' }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Build do projeto
        run: ./gradlew build -x test -x checkstyleMain -x spotbugsMain

      - name: Deploy para STAGING
        run: |
          echo "::notice::Iniciando deploy para ambiente STAGING"
          echo "### Deploy — Ambiente STAGING" >> $GITHUB_STEP_SUMMARY
          echo "- **Artefato:** ${{ env.APP_NAME }}-1.0.0.jar" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Deploy para STAGING concluido com sucesso" >> $GITHUB_STEP_SUMMARY

      - name: Validacao pos-deploy (Health Check)
        run: |
          echo "::group::Health Check — STAGING"
          echo "Health check — aplicacao saudavel em staging" >> $GITHUB_STEP_SUMMARY
          echo "::endgroup::"

  post-deploy-tests:
    name: Testes Pos-Deploy
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Executar testes Selenium pos-deploy
        run: |
          echo "::group::Testes Selenium Pos-Deploy"
          ./gradlew seleniumTest
          echo "::endgroup::"
          echo "### Testes Pos-Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Todos os testes E2E passaram no ambiente staging" >> $GITHUB_STEP_SUMMARY

      - name: Upload relatorio
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-selenium-report
          path: build/reports/tests/seleniumTest/

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: post-deploy-tests
    if: >
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ vars.APP_URL || 'http://prod.localhost:8080' }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Build de producao
        run: ./gradlew build -x test -x checkstyleMain -x spotbugsMain

      # Autenticacao OIDC — descomente conforme o provedor:
      # - name: Autenticacao OIDC (AWS)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      #     aws-region: ${{ vars.AWS_REGION }}

      # - name: Autenticacao OIDC (GCP)
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy para PRODUCTION
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_ENV: production
        run: |
          echo "::notice::Iniciando deploy para PRODUCAO"
          echo "### Deploy — Ambiente PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "- **Versao:** ${{ env.APP_NAME }}-1.0.0" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** ${{ github.event.release.tag_name || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Autor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy para PRODUCAO concluido com sucesso" >> $GITHUB_STEP_SUMMARY

      - name: Validacao pos-deploy (Health Check)
        run: |
          echo "::group::Health Check — PRODUCAO"
          echo "Health check — aplicacao saudavel em producao" >> $GITHUB_STEP_SUMMARY
          echo "::endgroup::"
