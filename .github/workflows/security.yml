name: Security — Analise SAST/DAST

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  JAVA_VERSION: '17'

jobs:
  sast:
    name: SAST — SpotBugs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Compilar projeto
        run: ./gradlew classes

      - name: Executar SpotBugs (SAST)
        run: |
          echo "::group::SpotBugs — Analise de Seguranca"
          ./gradlew spotbugsMain || true
          echo "::endgroup::"
          echo "### SAST — SpotBugs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "build/reports/spotbugs/main.html" ]; then
            echo "Relatorio gerado — verifique os artefatos para detalhes" >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhum bug encontrado" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload relatorio SpotBugs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-spotbugs-report
          path: |
            build/reports/spotbugs/

  dast:
    name: DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Configurar cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissao ao Gradle Wrapper
        run: chmod +x gradlew

      - name: Iniciar aplicacao em background
        run: |
          echo "::group::Iniciar Aplicacao"
          ./gradlew bootRun &
          echo "Aguardando aplicacao iniciar..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Aplicacao pronta!"
              break
            fi
            echo "Tentativa $i/30 — aguardando..."
            sleep 2
          done
          echo "::endgroup::"

      - name: OWASP ZAP — Scan Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: ''
          cmd_options: '-a -j'
          allow_issue_writing: false
        continue-on-error: true

      - name: Gerar resumo DAST
        if: always()
        run: |
          echo "### DAST — OWASP ZAP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan baseline executado contra http://localhost:8080" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifique os artefatos para o relatorio completo." >> $GITHUB_STEP_SUMMARY

      - name: Upload relatorio ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-report
          path: report_html.html
          if-no-files-found: ignore

  security-summary:
    name: Resumo de Seguranca
    runs-on: ubuntu-latest
    needs: [sast, dast]
    if: always()

    steps:
      - name: Gerar resumo consolidado
        run: |
          echo "# Resumo de Seguranca" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Analise | Tipo | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SpotBugs | SAST | ${{ needs.sast.result == 'success' && 'OK' || 'Verificar' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP | DAST | ${{ needs.dast.result == 'success' && 'OK' || 'Verificar' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Executado em: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
